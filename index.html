
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LingoSwap — Chat, Translate & Learn Languages</title>
  <meta name="description" content="LingoSwap connects language learners with native speakers for real-time chat, in-chat translation, and phrase saving. Start your language exchange journey today.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: {
              main:  'var(--bg-main)',
              card:  'var(--bg-surface)',
              hover: 'var(--bg-surface-hover)',
              base:  'var(--bg-main)'
            },
            theme: {
              border: 'var(--border-color)',
              text:   'var(--text-primary)',
              muted:  'var(--text-secondary)'
            },
            accent: {
              primary: 'var(--accent-primary)',
              amber:   'var(--accent-amber)',
              violet:  'var(--accent-violet)'
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Inline early-paint theme to prevent flash -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
